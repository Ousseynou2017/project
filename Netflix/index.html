<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Clone - The Witcher</title>
    <link rel="stylesheet" href="./index.css" />
</head>
<body>
    <main>
        <!-- Barre latérale -->
        <div class="navbar">
            <h1>NETFLIX<span style="color: red">.</span></h1>
            <div>
                <span>Menu</span>
                <span class="hover-style">Browse</span>
                <span class="hover-style">Watchlist</span>
                <span class="hover-style">Coming soon</span>
                <span>Social</span>
                <span class="hover-style">Browse</span>
                <span class="hover-style">Parties</span>
                <span>General</span>
                <span class="hover-style">Setting</span>
                <span>Log out</span>
            </div>
        </div>

        <!-- Contenu Principal -->
        <div class="content">
            <div class="content-bar">
                <div>
                    <img src="./img/img-1.png" alt="nav-1"/>
                    <img src="./img/img-2.png" alt="nav-2"/>
                </div>
                <div class="search-bar">
                    <img src="./img/img-3.png" alt="search" />
                    <input type="text" placeholder="Search" />
                </div>
                <div class="Search-details">
                    <div class="message">
                        <div class="point-1"></div>
                        <img src="./img/img-4.png" alt="notif" />
                    </div>
                    <div class="message">
                        <div class="point"></div>
                        <img class="img-message" src="./img/img-5.png" alt="msg" />
                    </div>
                    <img class="cat" src="./img/img-cat.jpg" alt="profile" />
                    <div class="cat-info">
                        <span>Cat Doe</span>
                        <span>Admin</span>
                    </div>
                </div>
            </div>

            <!-- Bannière Principale (L'image s'affiche ici via le CSS) -->
            <div class="content-img">
                <div class="ep-cats">
                    <div class="episodes">10XP / épisodes</div>
                    <img class="cat-mini" src="./img/img-cat.jpg" />
                    <img class="cat-mini" src="./img/img-cat.jpg" />
                    <img class="cat-mini" src="./img/img-cat.jpg" />
                </div>
                <div class="ep-info">
                    <h1>The Witcher</h1>
                    <span>98% Match</span>
                    <span>2 Seasons</span>
                    <div class="buttons">
                        <button class="button-1">Watch Now</button>
                        <button class="button-2">
                            <img class="img-6" src="./img/img-6.png" />
                        </button>
                    </div>
                </div>
            </div>

            <h1 class="catalogue-h1">Categories</h1>
            <div class="all-catalogue">
                <!-- Catégorie 1 -->
                <div class="catalogue">
                    <img class="cat-2" src="./img/img-cat.jpg" />
                    <h3>The Witcher</h3>
                    <p>Lorem ipsum dolor sit amet</p>
                    <div class="cat-3-div">
                        <img class="cat-3" src="./img/img-cat.jpg" />
                        <img class="cat-3" src="./img/img-cat.jpg" />
                    </div>
                </div>
                <!-- Catégorie 2 -->
                <div class="catalogue">
                    <img class="cat-2" src="./img/img-cat.jpg" />
                    <h3>The Witcher</h3>
                    <p>Lorem ipsum dolor sit amet</p>
                    <div class="cat-3-div">
                        <img class="cat-3" src="./img/img-cat.jpg" />
                        <img class="cat-3" src="./img/img-cat.jpg" />
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
